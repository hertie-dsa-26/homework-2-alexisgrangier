{% extends 'layout.html' %}
{% block content %}
<h1>Circle Calculator</h1>

<form method="post">
    <input type="text" name="radius" placeholder="Enter radius">

    <select name="operation">
        <option value="area">Area</option>
        <option value="perimeter">Perimeter</option>
    </select>

    <button type="submit">Calculate</button>
</form>

<p>{{ printed_result }}</p>

{% endblock %}
